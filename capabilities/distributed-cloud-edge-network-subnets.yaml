naftiko: 1.0.0-alpha2
info:
  label: Google Distributed Cloud Edge Network API — Subnets
  description: 'Google Distributed Cloud Edge Network API — Subnets. 2 operations. Lead operation: Google Distributed Cloud
    List subnets. Self-contained Naftiko capability covering one Google Distributed Cloud business surface.'
  tags:
  - Google Distributed Cloud
  - Subnets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_DISTRIBUTED_CLOUD_API_KEY: GOOGLE_DISTRIBUTED_CLOUD_API_KEY
capability:
  consumes:
  - type: http
    namespace: distributed-cloud-edge-network-subnets
    baseUri: https://edgenetwork.googleapis.com/v1
    description: Google Distributed Cloud Edge Network API — Subnets business capability. Self-contained, no shared references.
    resources:
    - name: projects-projectId-locations-location-zones-zone-subnets
      path: /projects/{projectId}/locations/{location}/zones/{zone}/subnets
      operations:
      - name: listsubnets
        method: GET
        description: Google Distributed Cloud List subnets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: location
          in: path
          type: string
          required: true
        - name: zone
          in: path
          type: string
          required: true
      - name: createsubnet
        method: POST
        description: Google Distributed Cloud Create a subnet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
        - name: location
          in: path
          type: string
          required: true
        - name: zone
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GOOGLE_DISTRIBUTED_CLOUD_API_KEY}}'
  exposes:
  - type: rest
    namespace: distributed-cloud-edge-network-subnets-rest
    port: 8080
    description: REST adapter for Google Distributed Cloud Edge Network API — Subnets. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/projects/{projectid}/locations/{location}/zones/{zone}/subnets
      name: projects-projectid-locations-location-zones-zone-subnets
      description: REST surface for projects-projectId-locations-location-zones-zone-subnets.
      operations:
      - method: GET
        name: listsubnets
        description: Google Distributed Cloud List subnets
        call: distributed-cloud-edge-network-subnets.listsubnets
        with:
          projectId: rest.projectId
          location: rest.location
          zone: rest.zone
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsubnet
        description: Google Distributed Cloud Create a subnet
        call: distributed-cloud-edge-network-subnets.createsubnet
        with:
          projectId: rest.projectId
          location: rest.location
          zone: rest.zone
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: distributed-cloud-edge-network-subnets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Google Distributed Cloud Edge Network API — Subnets. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: google-distributed-cloud-list-subnets
      description: Google Distributed Cloud List subnets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: distributed-cloud-edge-network-subnets.listsubnets
      with:
        projectId: tools.projectId
        location: tools.location
        zone: tools.zone
      outputParameters:
      - type: object
        mapping: $.
    - name: google-distributed-cloud-create-subnet
      description: Google Distributed Cloud Create a subnet
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: distributed-cloud-edge-network-subnets.createsubnet
      with:
        projectId: tools.projectId
        location: tools.location
        zone: tools.zone
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
