    resources:
    - path: /projects/{projectId}/locations/{location}/zones
      name: listzones
      operations:
      - method: GET
        name: listzones
        description: Google Distributed Cloud List zones
        call: google-distributed-cloud.listzones
        with:
          projectId: rest.projectId
          location: rest.location
        outputParameters:
        - type: object
          mapping: $.
