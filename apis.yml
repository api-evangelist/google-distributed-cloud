name: Google Distributed Cloud
description: >-
  Google Distributed Cloud provides fully managed hardware and software
  solutions that extend Google Cloud infrastructure and services to the edge
  and into customer data centers. It supports both connected and air-gapped
  deployments, enabling organizations to run workloads locally while leveraging
  Google Cloud management, security, and services.
