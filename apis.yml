apis:
  - name: Distributed Cloud Edge Network API
    description: >-
      The Distributed Cloud Edge Network API provides programmatic access to
      manage networking resources for Google Distributed Cloud connected
      deployments at the edge. Developers can use the API to create and manage
      networks, subnets, routers, and interconnect attachments for edge locations.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://cloud.google.com/distributed-cloud/edge/latest/docs
    baseURL: https://edgenetwork.googleapis.com
    tags:
      - Edge Network
      - Networking
      - Routers
      - Subnets
    properties:
      - type: Documentation
        url: https://cloud.google.com/distributed-cloud/edge/latest/docs/apis
      - type: OpenAPI
        url: openapi/distributed-cloud-edge-network-api-openapi.yml
      - type: Authentication
        url: https://cloud.google.com/docs/authentication
      - type: Getting Started
        url: https://cloud.google.com/distributed-cloud/docs/overview
      - type: JSONSchema
        url: json-schema/google-distributed-cloud-network-schema.json
  - name: GDC Hardware Management API
    description: >-
      The GDC Hardware Management API provides programmatic access to manage
      hardware lifecycle for Google Distributed Cloud deployments. Developers
      can use the API to track hardware orders, manage hardware groups, monitor
      hardware status, and handle site-level hardware configurations.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://cloud.google.com/distributed-cloud/connected/docs
    baseURL: https://gdchardwaremanagement.googleapis.com
    tags:
      - Hardware
      - Infrastructure
      - Provisioning
    properties:
      - type: Documentation
        url: https://cloud.google.com/distributed-cloud/connected/docs
      - type: Authentication
        url: https://cloud.google.com/docs/authentication
